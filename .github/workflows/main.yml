name: Train and Record Pong Agent

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the run manually from the Actions tab

jobs:
  train-eval:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies for Rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg python3-opengl

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU version of PyTorch for CI efficiency
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          # Install gymnasium with atari and opencv dependencies
          pip install "gymnasium[atari,accept-rom-license]" 
          pip install opencv-python-headless skrl moviepy ale-py

      - name: Run Training and Record Video
        # xvfb-run creates a virtual display so the game can render headlessly
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" python main.py

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pong-agent-video
          path: videos/
          retention-days: 7
