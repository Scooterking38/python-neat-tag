name: Run NEAT Game

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install neat-python opencv-python numpy

    - name: Run training
      run: |
        python main.py

    - name: Upload video
      uses: actions/upload-artifact@v3
      with:
        name: result-video
        path: best.mp4
