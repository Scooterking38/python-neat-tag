name: Train Tag AI

on: [push]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install torch
        pip install skrl
        pip install pygame
        pip install imageio
        pip install numpy

    - name: Run training
      run: python tag_game_rl.py

