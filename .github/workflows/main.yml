name: SB3 Pong Train and Record

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-rl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Install RL Dependencies
        run: |
          pip install "gymnasium[atari,accept-rom-license]"
          pip install stable-baselines3 shimmy opencv-python-headless ale-py

      - name: Run Script
        run: |
          xvfb-run -a python main.py

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: pong-video
          path: videos/
