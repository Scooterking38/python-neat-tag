name: Run RL and Upload Video

on:
  workflow_dispatch:

jobs:
  run-rl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch gymnasium skrl[all] numpy opencv-python

      - name: Create output directory
        run: mkdir -p videos

      - name: Run RL evaluation headlessly
        run: |
          python your_script.py --headless --eval
        env:
          CUDA_VISIBLE_DEVICES: ""  # force CPU

      - name: Package video
        run: |
          cp -r runs/torch/Pendulum/best_run videos/

      - name: Upload video artifact
        uses: actions/upload-artifact@v3
        with:
          name: best-run-video
          path: videos/
