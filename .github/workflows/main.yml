name: SB3 Pong Fix

on: [push, workflow_dispatch]

jobs:
  run-rl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg
          pip install "gymnasium[atari,accept-rom-license]"
          pip install stable-baselines3[extra] shimmy opencv-python-headless ale-py

      - name: Run Script
        # xvfb-run -a handles the virtual display automatically
        run: |
          xvfb-run -a python main.py

      - name: Upload Videos
        if: always() # Upload even if the script failed
        uses: actions/upload-artifact@v4
        with:
          name: output-files
          path: |
            videos/
            *.zip
