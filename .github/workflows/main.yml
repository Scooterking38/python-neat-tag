name: NEAT Tagged-Evader Training

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install neat-python opencv-python numpy dill

    - name: Run training and generate video
      run: python main.py

    - name: Save best genomes to pickle
      run: python -c "import dill, main; best_tagger, best_evader, config = main.run('config.txt'); dill.dump(best_tagger, open('best_tagger.pkl','wb')); dill.dump(best_evader, open('best_evader.pkl','wb'))"

    - name: Upload trained populations and video
      uses: actions/upload-artifact@v4
      with:
        name: neat-tagged-evader-artifacts
        path: |
          best_tagger.pkl
          best_evader.pkl
          best.mp4
